<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Share Your Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>Dr. Vithalrao Vikhe Patil College of Engineering</h1>
      <p class="hero-text">Alumni Testimonial Consent Form</p>
    </section>

    <section class="form-card" aria-labelledby="form-heading">
      <p class="required-note"><span>*</span> Indicates required question</p>

      <form id="testimonialForm" novalidate>
        <h2 id="form-heading" class="sr-only">Testimonial Form</h2>

        <div class="field">
          <label for="name">1. Name Alumni <span>*</span></label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required />
          <p class="error" id="nameError"></p>
        </div>

        <div class="field">
          <label for="yearOfGraduation">2. Year of Graduation <span>*</span></label>
          <input
            type="text"
            id="yearOfGraduation"
            name="yearOfGraduation"
            placeholder="Example: 2021"
            required
          />
          <p class="error" id="yearOfGraduationError"></p>
        </div>

        <div class="field">
          <label for="branchDepartment">3. Branch / Department <span>*</span></label>
          <input
            type="text"
            id="branchDepartment"
            name="branchDepartment"
            placeholder="Example: Computer Engineering"
            required
          />
          <p class="error" id="branchDepartmentError"></p>
        </div>

        <div class="field">
          <label for="currentOrganization">4. Current Organization / Company <span>*</span></label>
          <input
            type="text"
            id="currentOrganization"
            name="currentOrganization"
            placeholder="Enter your current company or organization"
            required
          />
          <p class="error" id="currentOrganizationError"></p>
        </div>

        <div class="field">
          <label for="currentDesignation">5. Current Designation <span>*</span></label>
          <input
            type="text"
            id="currentDesignation"
            name="currentDesignation"
            placeholder="Example: Software Engineer"
            required
          />
          <p class="error" id="currentDesignationError"></p>
        </div>

        <div class="field">
          <fieldset>
            <legend>6. I have shared testimonial to Dr. S. R. Udawant, Alumni Coordinator <span>*</span></legend>
            <label class="option">
              <input
                type="checkbox"
                id="sharedWithCoordinator"
                name="sharedWithCoordinator"
                value="Yes"
                required
              />
              Yes, I confirm
            </label>
          </fieldset>
          <p class="error" id="sharedWithCoordinatorError"></p>
        </div>

        <div class="field">
          <fieldset>
            <legend>7. Consent Declaration <span>*</span></legend>
            <label class="option">
              <input
                type="checkbox"
                id="consentDeclaration"
                name="consentDeclaration"
                value="I give my consent to Dr. Vithalrao Vikhe Patil Engineering College to use my testimonial, name, and photograph for academic and promotional purposes."
                required
              />
              I give my consent to Dr. Vithalrao Vikhe Patil Engineering College to use my
              testimonial, name, and photograph for academic and promotional purposes.
            </label>
          </fieldset>
          <p class="error" id="consentDeclarationError"></p>
        </div>

        <div class="actions">
          <button type="submit" id="submitBtn" class="btn primary">Submit</button>
        </div>
        <p class="error" id="formError"></p>
      </form>

      <div id="successMessage" class="success hidden" role="status" aria-live="polite">
        <h3>Thank you!</h3>
        <p>Your testimonial has been submitted successfully.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
